 {% extends "base.html" %}

{% block title %}Contact - P2P{% endblock %}

{% block content %}
<div class="container mt-3">
    <div class="card" style="max-width: 600px; margin: 0 auto;">
        <div class="card-body">
            <h1><i class="fas fa-envelope"></i> Contact Us</h1>
            
            <p class="text-muted">Have questions or feedback? We'd love to hear from you!</p>
            
            <form class="mt-3">
                <div class="form-group">
                    <label class="form-label">Your Name</label>
                    <input type="text" class="form-control" placeholder="Enter your name">
                </div>
                
                <div class="form-group">
                    <label class="form-label">Your Email</label>
                    <input type="email" class="form-control" placeholder="Enter your email">
                </div>
                
                <div class="form-group">
                    <label class="form-label">Message</label>
                    <textarea class="form-control" rows="5" placeholder="Write your message"></textarea>
                </div>
                
                <button type="submit" class="btn btn-primary">
                    <i class="fas fa-paper-plane"></i> Send Message
                </button>
            </form>
            
            <hr>
            
            <h3>Other Ways to Reach Us</h3>
            <ul="mt class-2">
                <li><i class="fas fa-envelope"></i> Email: support@skillswap.com</li>
                <li><i class="fas fa-phone"></i> Phone: +1 (555) 123-4567</li>
            </ul>
        </div>
    </div>
</div>
{% endblock %}
